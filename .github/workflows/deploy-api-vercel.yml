name: Deploy Hono API to Vercel

on:
  push:
    branches: [dev, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-api-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name == 'main' && 'production-vercel-api' || 'preview-vercel-api' }}
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Pull Vercel API project settings
        run: npx vercel@latest pull --yes --environment="$VERCEL_ENV" --token="$VERCEL_TOKEN"
        env:
          VERCEL_ENV: ${{ github.ref_name == 'main' && 'production' || 'preview' }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Build API deployment
        run: |
          if [[ "$GITHUB_REF_NAME" == "main" ]]; then
            npx vercel@latest build --prod --token="$VERCEL_TOKEN"
          else
            npx vercel@latest build --token="$VERCEL_TOKEN"
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Deploy API
        id: deploy
        run: |
          if [[ "$GITHUB_REF_NAME" == "main" ]]; then
            DEPLOYMENT_URL="$(npx vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN")"
          else
            DEPLOYMENT_URL="$(npx vercel@latest deploy --prebuilt --token="$VERCEL_TOKEN")"
            npx vercel@latest alias set "$DEPLOYMENT_URL" bayjf-dev.vercel.app --token="$VERCEL_TOKEN"
          fi
          echo "url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
